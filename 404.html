<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shadman Sakib</title>
    <script>
      // GitHub Pages SPA redirect: rewrites the 404 URL into a query param
      // so index.html can parse it and hand it to the React Router.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
